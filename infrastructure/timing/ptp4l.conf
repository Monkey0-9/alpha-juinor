# Tower Research / Jump Trading Style ptp4l Configuration
# 
# Configures the linux ptp4l daemon to synchronize the local hardware NIC clock (PHC)
# with the datacenter's GPS-backed Grandmaster clock via IEEE 1588.
# 
# Required for sub-microsecond latency measurement across microwave links
# and regulatory compliance (MiFID II timestamping rules).

[global]
# Use hardware timestamping
time_stamping           hardware

# Transport layer for PTP (L2 is faster/lower jitter than UDP/IPv4)
network_transport       L2

# Delay mechanism
delay_mechanism         E2E

# Sync interval (2^-4 = 1/16 seconds, or 16 Sync messages per second)
logSyncInterval         -4
logMinDelayReqInterval  -4

# We operate as a pure slave to the exchange/datacenter Grandmaster
slaveOnly               1

# Hardware optimizations
tx_timestamp_timeout    5
use_syslog              1
logging_level           5

# Force the servo to aggressively correct large offsets (e.g. after a reboot)
step_threshold          0.00002

# Boundary clock settings (disabled, we are an end-node)
boundary_clock_jbod     0

[eth0]
# Apply these strict PTP rules to the primary trading interface (Solarflare/Mellanox NIC)
