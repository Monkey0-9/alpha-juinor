# Zero-Trust Security Architecture for Mini Quant Fund
# Production-ready security using entirely open-source tools

apiVersion: v1
kind: Namespace
metadata:
  name: quant-fund
  labels:
    security.level: "high"
    compliance: "zero-trust"
---
# Network Policy - Default Deny All
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: quant-fund
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Network Policy - Allow DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: quant-fund
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# Pod Security Policy - Restricted
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: quant-fund-restricted
  namespace: quant-fund
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
  readOnlyRootFilesystem: false
---
# Security Context Constraints
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: quant-fund-scc
  namespace: quant-fund
spec:
  allowPrivilegedContainer: false
  allowHostDirVolumePlugin: false
  allowHostIPC: false
  allowHostNetwork: false
  allowHostPID: false
  allowHostPorts: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsUser:
    type: MustRunAsRange
  seLinuxContext:
    type: MustRunAs
  fsGroup:
    type: MustRunAs
  volumes:
    - 'configMap'
    - 'downwardAPI'
    - 'emptyDir'
    - 'persistentVolumeClaim'
    - 'projected'
    - 'secret'
---
# OPA Gatekeeper Policy - No Privileged Pods
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: no-privileged-pods
  namespace: quant-fund
spec:
  enforcementAction: deny
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
  parameters:
    labels:
      - key: "security.level"
        allowedRegex: "standard|restricted"
---
# OPA Gatekeeper Policy - Image Verification
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredAnnotations
metadata:
  name: verified-images
  namespace: quant-fund
spec:
  enforcementAction: deny
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
  parameters:
    annotations:
      - key: "image.security.policy"
        allowedRegex: "verified|trusted"
---
# Falco Rules for Security Monitoring
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-rules
  namespace: quant-fund
data:
  trading_engine_rules.yaml: |
    - rule: Unauthorized Trading Engine Access
      desc: Detect unauthorized access to trading engine
      condition: >
        spawned_process and proc.name in (bash, sh, ksh) and 
        container.name contains "trading-engine" and
        not user.name in ("trading-service", "root")
      output: >
        Unauthorized shell access in trading engine (user=%user.name container=%container.name)
      priority: HIGH
      tags: [process, container, security]
      
    - rule: Sensitive File Access
      desc: Detect access to sensitive files
      condition: >
        open_read and fd.name contains ("/etc/passwd", "/etc/shadow", "/etc/hosts") and
        container.name contains "trading-engine" and
        not proc.name in (cat, less, more, vim, nano)
      output: >
        Sensitive file access detected (user=%user.name file=%fd.name container=%container.name)
      priority: MEDIUM
      tags: [file, security]
      
    - rule: Network Connection to Unknown Host
      desc: Detect network connections to unknown hosts
      condition: >
        connect and not fd.sip in ("127.0.0.1", "10.0.0.0/8", "192.168.0.0/16", "172.16.0.0/12") and
        container.name contains "trading-engine"
      output: >
        Network connection to unknown host (user=%user.name sip=%fd.sip container=%container.name)
      priority: MEDIUM
      tags: [network, security]
---
# Falco DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: quant-fund
  labels:
    app: falco
    component: security
spec:
  selector:
    matchLabels:
      app: falco
  template:
    metadata:
      labels:
        app: falco
        component: security
    spec:
      serviceAccountName: falco
      hostNetwork: true
      hostPID: true
      hostIPC: true
      containers:
      - name: falco
        image: falcosecurity/falco:latest
        args:
        - /usr/bin/falco
        - --config-file
        - /etc/falco/config.yaml
        - --config-include
        - /etc/falco/rules.d
        securityContext:
          privileged: true
        volumeMounts:
        - name: var-run
          mountPath: /var/run
        - name: var-lib
          mountPath: /var/lib
        - name: etc-falco
          mountPath: /etc/falco
          readOnly: true
        - name: falco-rules
          mountPath: /etc/falco/rules.d
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: var-run
        hostPath:
          path: /var/run
      - name: var-lib
        hostPath:
          path: /var/lib
      - name: etc-falco
        configMap:
          name: falco-config
      - name: falco-rules
        configMap:
          name: falco-rules
---
# Falco Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: falco
  namespace: quant-fund
---
# Falco RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: falco
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - nodes
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: falco
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: falco
subjects:
- kind: ServiceAccount
  name: falco
  namespace: quant-fund
---
# Falco Config
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-config
  namespace: quant-fund
data:
  config.yaml: |
    # Falco configuration
    kind: Config
    metadata:
      creation_timestamp: null
    spec:
      priority: "debug"
      outputs:
        - output_file:
            enabled: true
            keep_alive: false
            filename: /var/log/falco/falco.log
        - output_syslog:
            enabled: true
            keep_alive: false
      syslog_output:
        program: "falco"
        facility: "local0"
    falco_rules_file: "/etc/falco/rules.d"
---
# Open Policy Agent (OPA) Config
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-config
  namespace: quant-fund
data:
  config.yaml: |
    services:
      - name: quant-fund
        url: http://bundle:8081/v1/bundles/quant-fund
    bundles:
      quant-fund:
        resource: file:///bundles/quant-fund.tar.gz
        persist: true
        polling:
          min_delay_seconds: 10
          max_delay_seconds: 60
    decision_logs:
      console: true
      http:
        headers:
          X-Content-Type-Options: ["nosniff"]
        port: 8181
        tls:
          cert: /etc/opa/certs/server.crt
          key: /etc/opa/certs/server.key
    discovery:
      name: discovery
      service: discovery
---
# OPA Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: quant-fund
  labels:
    app: opa
    component: security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
        component: security
    spec:
      containers:
      - name: opa
        image: openpolicyagent/opa:latest
        args:
        - "run"
        - "--server"
        - "--log-level=info"
        - "--config=/etc/opa/config.yaml"
        - "--addr=0.0.0.0:8181"
        - "--set=services.decision_logs.console=true"
        ports:
        - containerPort: 8181
          name: http
        volumeMounts:
        - name: opa-config
          mountPath: /etc/opa
          readOnly: true
        - name: opa-bundles
          mountPath: /bundles
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /v1/policies
            port: 8181
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8181
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: opa-config
        configMap:
          name: opa-config
      - name: opa-bundles
        configMap:
          name: opa-bundles
---
# OPA Service
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: quant-fund
  labels:
    app: opa
    component: security
spec:
  ports:
  - port: 8181
    targetPort: 8181
    name: http
  selector:
    app: opa
---
# OPA Bundle Service
apiVersion: v1
kind: Service
metadata:
  name: bundle
  namespace: quant-fund
  labels:
    app: opa
    component: security
spec:
  ports:
  - port: 8081
    targetPort: 8081
    name: http
  selector:
    app: opa
---
# OPA Bundle Config
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-bundles
  namespace: quant-fund
data:
  quant-fund.rego: |
    package quantfund.security
    
    default allow = false
    
    allow {
        input.method == "GET"
        input.path == "/health"
    }
    
    allow {
        input.method == "POST"
        input.path == "/trading/signals"
        input.user.role == "trader"
        input.user.authenticated == true
    }
    
    allow {
        input.method == "GET"
        input.path == "/risk/metrics"
        input.user.role in ["trader", "risk_manager", "admin"]
        input.user.authenticated == true
    }
    
    allow {
        input.method == "POST"
        input.path == "/admin/config"
        input.user.role == "admin"
        input.user.authenticated == true
    }
    
    deny {
        input.method == "DELETE"
        input.user.role != "admin"
    }
    
    deny {
        input.source_ip not in allowed_ips
    }
    
    allowed_ips = {
        "10.0.0.0/8",
        "192.168.0.0/16",
        "172.16.0.0/12"
    }
---
# Vault for Secrets Management
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: quant-fund
  labels:
    app: vault
    component: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
        component: security
    spec:
      containers:
      - name: vault
        image: vault:1.13.0
        command:
        - vault
        - server
        - -config=/etc/vault/config.hcl
        ports:
        - containerPort: 8200
          name: vault
        env:
        - name: VAULT_ADDR
          value: "http://localhost:8200"
        - name: VAULT_API_ADDR
          value: "http://localhost:8200"
        - name: VAULT_CLUSTER_ADDR
          value: "http://localhost:8201"
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
        volumeMounts:
        - name: vault-config
          mountPath: /etc/vault
          readOnly: true
        - name: vault-data
          mountPath: /vault/file
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/sys/health
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: vault-config
        configMap:
          name: vault-config
      - name: vault-data
        emptyDir: {}
---
# Vault Config
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: quant-fund
data:
  config.hcl: |
    ui = true
    
    listener "tcp" {
      address = "0.0.0.0:8200"
      tls_disable = 1
    }
    
    listener "tcp" {
      address = "0.0.0.0:8201"
      tls_disable = 1
    }
    
    storage "file" {
      path = "/vault/file"
    }
    
    api_addr = "http://0.0.0.0:8200"
    cluster_addr = "http://0.0.0.0:8201"
    
    default_lease_ttl = "168h"
    default_max_ttl = "720h"
    
    disable_mlock = true
---
# Vault Service
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: quant-fund
  labels:
    app: vault
    component: security
spec:
  ports:
  - port: 8200
    targetPort: 8200
    name: vault
  selector:
    app: vault
---
# Vault Init Job
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: quant-fund
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: vault-init
        image: vault:1.13.0
        command:
        - /bin/sh
        - -c
        - |
          # Wait for Vault to be ready
          until vault status; do
            echo "Waiting for Vault..."
            sleep 1
          done
          
          # Initialize Vault
          vault operator init -key-shares=5 -key-threshold=3 -format=json > /tmp/vault-init.json
          
          # Unseal Vault
          vault operator unseal $(jq -r '.unseal_keys_b64[0]' /tmp/vault-init.json | base64 -d)
          vault operator unseal $(jq -r '.unseal_keys_b64[1]' /tmp/vault-init.json | base64 -d)
          vault operator unseal $(jq -r '.unseal_keys_b64[2]' /tmp/vault-init.json | base64 -d)
          
          echo "Vault initialized and unsealed"
        env:
        - name: VAULT_ADDR
          value: "http://vault:8200"
        volumeMounts:
        - name: vault-data
          mountPath: /tmp
      volumes:
      - name: vault-data
        emptyDir: {}
---
# Cert-Manager for Certificate Management
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  releaseName: cert-manager
  targetNamespace: cert-manager
  chart:
    repository: https://charts.jetstack.io
    name: cert-manager
    version: v1.11.0
---
# ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: security@quantfund.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
---
# Certificate for API
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: quantfund-api-tls
  namespace: quant-fund
spec:
  secretName: quantfund-tls
  dnsNames:
  - api.quantfund.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
# External Secrets Operator
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  releaseName: external-secrets
  targetNamespace: external-secrets
  chart:
    repository: https://charts.external-secrets.io
    name: external-secrets
    version: v0.7.0
---
# External Secret for Alpaca API
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: alpaca-secret-store
  namespace: quant-fund
spec:
  provider:
    vault:
      server: "http://vault:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "auth/kubernetes"
          role: "quant-fund"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alpaca-api-keys
  namespace: quant-fund
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: alpaca-secret-store
    kind: SecretStore
  target:
    name: alpaca-api-keys
    creationPolicy: Owner
  data:
  - secretKey: ALPACA_API_KEY
    remoteRef:
      key: alpaca/api-key
  - secretKey: ALPACA_SECRET_KEY
    remoteRef:
      key: alpaca/secret-key
---
# Security Monitoring Dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-dashboard
  namespace: quant-fund
  labels:
    app: security-dashboard
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-dashboard
  template:
    metadata:
      labels:
        app: security-dashboard
        component: monitoring
    spec:
      containers:
      - name: security-dashboard
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
          name: grafana
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: admin-password
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel,grafana-worldmap-panel"
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-config
          mountPath: /etc/grafana/provisioning
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-storage
      - name: grafana-config
        configMap:
          name: grafana-config
---
# Grafana Config
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: quant-fund
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /var/lib/grafana/dashboards/default
