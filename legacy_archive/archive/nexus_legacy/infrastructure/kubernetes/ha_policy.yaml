
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: quant-fund-pdb
  namespace: quant-fund
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: trading-engine
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trading-engine-hpa
  namespace: quant-fund
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trading-engine
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: trading-engine-internal
  namespace: quant-fund
spec:
  type: ClusterIP
  selector:
    app: trading-engine
  ports:
  - port: 50051
    targetPort: 50051
    name: grpc
