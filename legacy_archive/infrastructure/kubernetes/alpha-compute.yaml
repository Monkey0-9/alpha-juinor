apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-compute
  namespace: mini-quant
  labels:
    app: alpha-compute
    tier: engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: alpha-compute
  template:
    metadata:
      labels:
        app: alpha-compute
    spec:
      containers:
      - name: alpha-engine
        image: mini-quant-fund/alpha-engine:latest
        ports:
        - containerPort: 8080
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.streaming.svc.cluster.local:9092"
        - name: REDIS_URL
          value: "redis://redis-master.data.svc.cluster.local:6379"
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: alpha-compute-svc
  namespace: mini-quant
spec:
  selector:
    app: alpha-compute
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alpha-compute-hpa
  namespace: mini-quant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alpha-compute
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
