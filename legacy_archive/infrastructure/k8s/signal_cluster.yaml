# Two Sigma / Distributed Data Pipeline Style Kubernetes Config
# Manages petabyte-scale batch processing clusters for alpha extraction
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: signal-extraction-pipeline
  namespace: quant-research
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "nexus-registry/spark-alpha-ml:latest"
  imagePullPolicy: Always
  mainApplicationFile: "local:///opt/nexus/jobs/signal_generation.py"
  sparkVersion: "3.4.0"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 10
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20
  driver:
    cores: 4
    coreLimit: "4000m"
    memory: "16g"
    labels:
      version: 3.4.0
    serviceAccount: spark-operator
  executor:
    cores: 8
    instances: 500  # Scaling out to massive parallel nodes
    memory: "64g"
    labels:
      version: 3.4.0
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: instance-type
              operator: In
              values:
              - r5.8xlarge
              - r5.16xlarge
