# HUGEFUNDS - Production Docker Compose Stack
# Phase 7: Docker/Prometheus/Grafana Production Stack

version: '3.8'

services:
  # ===========================================================================
  # FASTAPI APPLICATION
  # ===========================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hugefunds_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@timescaledb:5432/hugefunds
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    env_file:
      - .env
    depends_on:
      - timescaledb
      - redis
    networks:
      - hugefunds_network
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # TIMESCALEDB - Time-Series Database
  # ===========================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: hugefunds_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hugefunds
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - hugefunds_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # REDIS - Caching & Message Queue
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: hugefunds_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hugefunds_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # PROMETHEUS - Metrics Collection
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: hugefunds_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - hugefunds_network
    depends_on:
      - api

  # ===========================================================================
  # GRAFANA - Visualization Dashboard
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: hugefunds_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - hugefunds_network
    depends_on:
      - prometheus

  # ===========================================================================
  # CELERY WORKER - Background Tasks
  # ===========================================================================
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hugefunds_celery
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@timescaledb:5432/hugefunds
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - timescaledb
      - redis
    networks:
      - hugefunds_network
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models

  # ===========================================================================
  # CELERY BEAT - Scheduled Tasks
  # ===========================================================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hugefunds_celery_beat
    restart: unless-stopped
    command: celery -A tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@timescaledb:5432/hugefunds
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - timescaledb
      - redis
      - celery
    networks:
      - hugefunds_network
    volumes:
      - ./logs:/app/logs

  # ===========================================================================
  # NGINX - Reverse Proxy & Load Balancer
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: hugefunds_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./frontend:/usr/share/nginx/html
    networks:
      - hugefunds_network
    depends_on:
      - api

  # ===========================================================================
  # JUPYTER - Research Environment (Optional)
  # ===========================================================================
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: hugefunds_jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=hugefunds
    volumes:
      - ./research:/home/jovyan/work
      - ./data:/home/jovyan/data
    networks:
      - hugefunds_network
    profiles:
      - research

# ===========================================================================
# NETWORKS
# ===========================================================================
networks:
  hugefunds_network:
    driver: bridge

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  timescale_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
