# HUGEFUNDS - Enterprise CI/CD Pipeline
# Top 1% Grade: Multi-stage, Security Scanning, Blue-Green Deployments

name: HugeFunds CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hugefunds-app
  EKS_CLUSTER: hugefunds-production
  TF_VERSION: '1.5.0'

jobs:
  # ═════════════════════════════════════════════════════════════════════════════
  # STAGE 1: SECURITY & QUALITY GATES
  # ═════════════════════════════════════════════════════════════════════════════
  
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r backend/ -f json -o bandit-report.json || true
          bandit -r backend/ -ll
      
      - name: Run Checkov (IaC Security)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          output_format: sarif
          output_file_path: reports/checkov.sarif
      
      - name: Secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified
  
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install black flake8 mypy pytest pytest-cov
          pip install -r requirements.txt
      
      - name: Lint with Black
        run: black --check backend/
      
      - name: Lint with Flake8
        run: flake8 backend/ --max-line-length=120
      
      - name: Type check with MyPy
        run: mypy backend/ --ignore-missing-imports
      
      - name: Run tests with coverage
        run: |
          pytest backend/tests/ -v --cov=backend --cov-report=xml --cov-report=html
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

  # ═════════════════════════════════════════════════════════════════════════════
  # STAGE 2: BUILD & PUSH
  # ═════════════════════════════════════════════════════════════════════════════
  
  build:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]
    if: github.event_name != 'pull_request'
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  # ═════════════════════════════════════════════════════════════════════════════
  # STAGE 3: INFRASTRUCTURE DEPLOYMENT (Terraform)
  # ═════════════════════════════════════════════════════════════════════════════
  
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Format
        run: |
          cd infrastructure/terraform
          terraform fmt -check
      
      - name: Terraform Init
        run: |
          cd infrastructure/terraform
          terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Terraform Plan
        run: |
          cd infrastructure/terraform
          terraform plan -no-color -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Upload Plan
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: infrastructure/terraform/tfplan
  
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Terraform Init
        run: |
          cd infrastructure/terraform
          terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Terraform Apply
        run: |
          cd infrastructure/terraform
          terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ═════════════════════════════════════════════════════════════════════════════
  # STAGE 4: DEPLOY TO KUBERNETES
  # ═════════════════════════════════════════════════════════════════════════════
  
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, terraform-apply]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup kubectl
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name hugefunds-staging
      
      - name: Deploy to Staging
        run: |
          cd kubernetes
          kustomize edit set image hugefunds-app=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          kustomize build overlays/staging | kubectl apply -f -
      
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/hugefunds-app -n hugefunds --timeout=300s
      
      - name: Run smoke tests
        run: |
          curl -f https://staging.hugefunds.io/api/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, terraform-apply]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup kubectl
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}
      
      - name: Update image tag
        run: |
          cd kubernetes
          kustomize edit set image hugefunds-app=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
      
      - name: Blue-Green Deployment
        run: |
          # Deploy new version
          kustomize build overlays/production | kubectl apply -f -
          
          # Wait for new pods to be ready
          kubectl rollout status deployment/hugefunds-app -n hugefunds --timeout=600s
          
          # Run health checks
          kubectl run health-check --rm -i --restart=Never --image=curlimages/curl -- \
            curl -f http://hugefunds-app.hugefunds.svc.cluster.local/api/health
      
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'HugeFunds deployed to production! Version: ${{ github.sha }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()

  # ═════════════════════════════════════════════════════════════════════════════
  # STAGE 5: POST-DEPLOYMENT VALIDATION
  # ═════════════════════════════════════════════════════════════════════════════
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run API tests
        run: |
          pip install pytest requests
          pytest tests/integration/ -v --tb=short
        env:
          API_URL: https://api.hugefunds.io
      
      - name: Run load tests
        run: |
          pip install locust
          locust -f tests/load/locustfile.py --headless -u 100 -r 10 --run-time 5m

  # ═════════════════════════════════════════════════════════════════════════════
  # STAGE 6: BACKUP & DR VALIDATION
  # ═════════════════════════════════════════════════════════════════════════════
  
  backup-validation:
    name: Backup & DR Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Verify backup jobs
        run: |
          aws backup list-backup-jobs --by-resource-type RDS --query 'BackupJobs[?State==`COMPLETED`].{Id:BackupJobId,Created:CreationDate}' --output table
      
      - name: Test DR region connectivity
        run: |
          aws rds describe-db-clusters --region us-west-2 --query 'DBClusters[*].{ID:DBClusterIdentifier,Status:Status}'
