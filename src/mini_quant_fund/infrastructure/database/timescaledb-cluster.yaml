# Production TimescaleDB Cluster Configuration
# Enterprise-grade time-series database using open-source TimescaleDB

apiVersion: v1
kind: Namespace
metadata:
  name: quant-fund
  labels:
    database: timescaledb
    tier: production
---
# TimescaleDB ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: timescaledb-config
  namespace: quant-fund
data:
  postgresql.conf: |
    # PostgreSQL Configuration
    listen_addresses = '*'
    port = 5432
    max_connections = 500
    shared_buffers = 4GB
    effective_cache_size = 12GB
    maintenance_work_mem = 1GB
    checkpoint_completion_target = 0.9
    wal_buffers = 64MB
    default_statistics_target = 100
    
    # TimescaleDB Configuration
    shared_preload_libraries = 'timescaledb,pg_stat_statements,pg_stat_kcache'
    max_parallel_workers_per_gather = 4
    max_parallel_workers = 8
    max_parallel_maintenance_workers = 4
    max_parallel_workers_per_gather = 4
    
    # Performance Tuning
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 64MB
    min_wal_size = 2GB
    max_wal_size = 8GB
    
    # Logging
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_rotation_age = '1d'
    log_rotation_size = '100MB'
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_temp_files = 0
    
    # Replication
    wal_level = replica
    max_wal_senders = 10
    max_replication_slots = 10
    synchronous_commit = on
    
    # Autovacuum
    autovacuum = on
    autovacuum_max_workers = 4
    autovacuum_naptime = 30s
    autovacuum_vacuum_scale_factor = 0.05
    autovacuum_analyze_scale_factor = 0.1
    autovacuum_freeze_max_age = 200000000
    autovacuum_multixact_freeze_max_age = 200000000
    autovacuum_vacuum_cost_delay = 2ms
    
  pg_hba.conf: |
    # PostgreSQL Client Authentication Configuration
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    
    # Local connections
    local   all             all                                     trust
    
    # IPv4 local connections
    host    all             all             127.0.0.1/32            md5
    host    all             all             10.0.0.0/8              md5
    host    all             all             192.168.0.0/16          md5
    host    all             all             172.16.0.0/12           md5
    
    # IPv6 local connections
    host    all             all             ::1/128                 md5
    
    # Kubernetes connections
    host    all             all             0.0.0.0/0               md5
    
    # Replication connections
    host    replication     replicator      0.0.0.0/0               md5
    
  recovery.conf: |
    # Recovery Configuration
    standby_mode = 'on'
    primary_conninfo = 'host=timescaledb-primary port=5432 user=replicator'
    restore_command = 'cp /var/lib/postgresql/wal_archive/%f %p'
    archive_cleanup_command = 'pg_archivecleanup /var/lib/postgresql/wal_archive %r'
    recovery_target_timeline = 'latest'
---
# TimescaleDB Primary StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb-primary
  namespace: quant-fund
  labels:
    app: timescaledb
    role: primary
spec:
  serviceName: timescaledb-primary
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
      role: primary
  template:
    metadata:
      labels:
        app: timescaledb
        role: primary
    spec:
      containers:
      - name: timescaledb
        image: timescale/timescaledb:latest-pg15
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: quantfund
        - name: POSTGRES_USER
          value: quantuser
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: timescaledb-secrets
              key: postgres-password
        - name: POSTGRES_REPLICATION_USER
          value: replicator
        - name: POSTGRES_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: timescaledb-secrets
              key: replication-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        command:
        - /bin/bash
        - -c
        - |
          # Initialize database if not exists
          if [ ! -f /var/lib/postgresql/data/pgdata/PG_VERSION ]; then
            echo "Initializing database..."
            initdb -D /var/lib/postgresql/data/pgdata -U postgres
            
            # Create replication user
            echo "CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD '${POSTGRES_REPLICATION_PASSWORD}';" >> /var/lib/postgresql/data/pgdata/init.sql
            echo "GRANT CONNECT ON DATABASE quantfund TO replicator;" >> /var/lib/postgresql/data/pgdata/init.sql
            
            # Create database
            echo "CREATE DATABASE quantfund;" >> /var/lib/postgresql/data/pgdata/init.sql
          fi
          
          # Start PostgreSQL
          postgres -D /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: timescaledb-storage
          mountPath: /var/lib/postgresql/data
        - name: timescaledb-config
          mountPath: /etc/postgresql/postgresql.conf
          subPath: postgresql.conf
        - name: timescaledb-config
          mountPath: /etc/postgresql/pg_hba.conf
          subPath: pg_hba.conf
        - name: timescaledb-wal
          mountPath: /var/lib/postgresql/wal_archive
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "16Gi"
            cpu: "8000m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres -h localhost
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres -h localhost
          initialDelaySeconds: 5
          periodSeconds: 5
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/bash
              - -c
              - |
                # Enable TimescaleDB
                psql -U postgres -d quantfund -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"
                
                # Create hypertables
                psql -U postgres -d quantfund -c "
                  CREATE TABLE IF NOT EXISTS market_data (
                    time TIMESTAMZ NOT NULL,
                    symbol TEXT NOT NULL,
                    open DOUBLE PRECISION,
                    high DOUBLE PRECISION,
                    low DOUBLE PRECISION,
                    close DOUBLE PRECISION,
                    volume BIGINT
                  );
                  SELECT create_hypertable('market_data', 'time', chunk_time_interval => INTERVAL '1 hour');
                "
                
                psql -U postgres -d quantfund -c "
                  CREATE TABLE IF NOT EXISTS trading_signals (
                    time TIMESTAMPZ NOT NULL,
                    symbol TEXT NOT NULL,
                    signal_type TEXT NOT NULL,
                    signal_value DOUBLE PRECISION,
                    confidence DOUBLE PRECISION,
                    strategy_id TEXT
                  );
                  SELECT create_hypertable('trading_signals', 'time', chunk_time_interval => INTERVAL '15 minutes');
                "
                
                psql -U postgres -d quantfund -c "
                  CREATE TABLE IF NOT EXISTS risk_metrics (
                    time TIMESTAMPZ NOT NULL,
                    portfolio_value DOUBLE PRECISION,
                    var_95 DOUBLE PRECISION,
                    cvar_95 DOUBLE PRECISION,
                    sharpe_ratio DOUBLE PRECISION,
                    max_drawdown DOUBLE PRECISION
                  );
                  SELECT create_hypertable('risk_metrics', 'time', chunk_time_interval => INTERVAL '5 minutes');
                "
                
                psql -U postgres -d quantfund -c "
                  CREATE TABLE IF NOT EXISTS alternative_data (
                    time TIMESTAMPZ NOT NULL,
                    source TEXT NOT NULL,
                    symbol TEXT NOT NULL,
                    metric_name TEXT NOT NULL,
                    metric_value DOUBLE PRECISION,
                    metadata JSONB
                  );
                  SELECT create_hypertable('alternative_data', 'time', chunk_time_interval => INTERVAL '1 hour');
                "
                
                # Create indexes
                psql -U postgres -d quantfund -c "CREATE INDEX IF NOT EXISTS idx_market_data_symbol_time ON market_data (symbol, time DESC);"
                psql -U postgres -d quantfund -c "CREATE INDEX IF NOT EXISTS idx_trading_signals_symbol_time ON trading_signals (symbol, time DESC);"
                psql -U postgres -d quantfund -c "CREATE INDEX IF NOT EXISTS idx_risk_metrics_time ON risk_metrics (time DESC);"
                psql -U postgres -d quantfund -c "CREATE INDEX IF NOT EXISTS idx_alternative_data_symbol_time ON alternative_data (symbol, time DESC);"
                
                # Create retention policies
                psql -U postgres -d quantfund -c "SELECT add_retention_policy('market_data', INTERVAL '2 years');"
                psql -U postgres -d quantfund -c "SELECT add_retention_policy('trading_signals', INTERVAL '1 year');"
                psql -U postgres -d quantfund -c "SELECT add_retention_policy('risk_metrics', INTERVAL '5 years');"
                psql -U postgres -d quantfund -c "SELECT add_retention_policy('alternative_data', INTERVAL '3 years');"
                
                # Create continuous aggregates
                psql -U postgres -d quantfund -c "
                  CREATE MATERIALIZED VIEW IF NOT EXISTS market_data_1h
                  WITH (timescaledb.continuous) AS
                  SELECT 
                    time_bucket('1 hour', time) AS hour,
                    symbol,
                    AVG(open) AS open,
                    MAX(high) AS high,
                    MIN(low) AS low,
                    AVG(close) AS close,
                    SUM(volume) AS volume
                  FROM market_data
                  GROUP BY hour, symbol;
                "
                
                psql -U postgres -d quantfund -c "
                  CREATE MATERIALIZED VIEW IF NOT EXISTS risk_metrics_1h
                  WITH (timescaledb.continuous) AS
                  SELECT 
                    time_bucket('1 hour', time) AS hour,
                    AVG(portfolio_value) AS portfolio_value,
                    AVG(var_95) AS var_95,
                    AVG(cvar_95) AS cvar_95,
                    AVG(sharpe_ratio) AS sharpe_ratio,
                    AVG(max_drawdown) AS max_drawdown
                  FROM risk_metrics
                  GROUP BY hour;
                "
                
                echo "TimescaleDB initialized successfully"
          preStop:
            exec:
              command:
              - /bin/bash
              - -c
              - |
                # Graceful shutdown
                pg_ctl -D /var/lib/postgresql/data/pgdata stop -m fast
      volumes:
      - name: timescaledb-storage
        persistentVolumeClaim:
          claimName: timescaledb-primary-storage
      - name: timescaledb-config
        configMap:
          name: timescaledb-config
      - name: timescaledb-wal
        persistentVolumeClaim:
          claimName: timescaledb-wal-storage
---
# TimescaleDB Replica StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb-replica
  namespace: quant-fund
  labels:
    app: timescaledb
    role: replica
spec:
  serviceName: timescaledb-replica
  replicas: 2
  selector:
    matchLabels:
      app: timescaledb
      role: replica
  template:
    metadata:
      labels:
        app: timescaledb
        role: replica
    spec:
      containers:
      - name: timescaledb
        image: timescale/timescaledb:latest-pg15
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: PGUSER
          value: postgres
        - name: POSTGRES_DB
          value: quantfund
        - name: POSTGRES_USER
          value: replicator
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: timescaledb-secrets
              key: replication-password
        - name: POSTGRES_MASTER_HOST
          value: timescaledb-primary
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        command:
        - /bin/bash
        - -c
        - |
          # Wait for primary to be ready
          until pg_isready -h timescaledb-primary -U replicator; do
            echo "Waiting for primary..."
            sleep 5
          done
          
          # Create replication slot
          psql -h timescaledb-primary -U replicator -d quantfund -c "SELECT * FROM pg_create_physical_replication_slot('replica_slot_$(hostname)', 'pgoutput');"
          
          # Start PostgreSQL replica
          postgres -D /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: timescaledb-storage
          mountPath: /var/lib/postgresql/data
        - name: timescaledb-config
          mountPath: /etc/postgresql/postgresql.conf
          subPath: postgresql.conf
        - name: timescaledb-config
          mountPath: /etc/postgresql/recovery.conf
          subPath: recovery.conf
        - name: timescaledb-wal
          mountPath: /var/lib/postgresql/wal_archive
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U replicator -h localhost
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U replicator -h localhost
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: timescaledb-storage
        persistentVolumeClaim:
          claimName: timescaledb-replica-storage
      - name: timescaledb-config
        configMap:
          name: timescaledb-config
      - name: timescaledb-wal
        persistentVolumeClaim:
          claimName: timescaledb-wal-storage
---
# TimescaleDB Primary Service
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-primary
  namespace: quant-fund
  labels:
    app: timescaledb
    role: primary
spec:
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: timescaledb
    role: primary
  type: ClusterIP
---
# TimescaleDB Replica Service
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-replica
  namespace: quant-fund
  labels:
    app: timescaledb
    role: replica
spec:
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: timescaledb
    role: replica
  type: ClusterIP
---
# TimescaleDB Read-Only Service
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-read
  namespace: quant-fund
  labels:
    app: timescaledb
    role: read
spec:
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: timescaledb
---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-primary-storage
  namespace: quant-fund
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: "fast-ssd"
  resources:
    requests:
      storage: 1Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-replica-storage
  namespace: quant-fund
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: "fast-ssd"
  resources:
    requests:
      storage: 500Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-wal-storage
  namespace: quant-fund
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: "fast-ssd"
  resources:
    requests:
      storage: 200Gi
---
# TimescaleDB Secrets
apiVersion: v1
kind: Secret
metadata:
  name: timescaledb-secrets
  namespace: quant-fund
type: Opaque
data:
  postgres-password: c3VwZXJfc2VjcmV0X3Bhc3N3b3Jk  # super_secret_password
  replication-password: cmVwbGljYXRvcl9wYXNz  # replicator_password
---
# TimescaleDB Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: timescaledb-backup
  namespace: quant-fund
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: timescale/timescaledb:latest-pg15
            command:
            - /bin/bash
            - -c
            - |
              # Create backup
              pg_dump -h timescaledb-primary -U postgres -d quantfund --verbose --file=/backup/quantfund-$(date +%Y%m%d_%H%M%S).sql
              
              # Compress backup
              gzip /backup/quantfund-$(date +%Y%m%d_%H%M%S).sql
              
              # Upload to S3 (if configured)
              if [ -n "$AWS_ACCESS_KEY_ID" ]; then
                aws s3 cp /backup/quantfund-$(date +%Y%m%d_%H%M%S).sql.gz s3://quantfund-backups/timescaledb/
              fi
              
              # Clean old backups (keep 30 days)
              find /backup -name "*.sql.gz" -mtime +30 -delete
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: timescaledb-secrets
                  key: postgres-password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: secret-access-key
                  optional: true
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-storage
          restartPolicy: OnFailure
---
# Backup Storage PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-storage
  namespace: quant-fund
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: "standard-ssd"
  resources:
    requests:
      storage: 500Gi
---
# TimescaleDB Monitoring
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb-exporter
  namespace: quant-fund
  labels:
    app: timescaledb-exporter
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb-exporter
  template:
    metadata:
      labels:
        app: timescaledb-exporter
        component: monitoring
    spec:
      containers:
      - name: exporter
        image: prometheuscommunity/postgres-exporter:latest
        ports:
        - containerPort: 9187
          name: metrics
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://postgres:5432/quantfund?sslmode=disable"
        - name: PG_EXPORTER_URL
          value: "postgresql://postgres:5432/quantfund?sslmode=disable"
        - name: PG_EXPORTER_USER
          value: "postgres"
        - name: PG_EXPORTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: timescaledb-secrets
              key: postgres-password
        - name: PG_EXPORTER_INCLUDE_DATABASE
          value: "true"
        - name: PG_EXPORTER_CONSTANT_LABELS
          value: "database=quantfund,cluster=quant-fund"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9187
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9187
          initialDelaySeconds: 5
          periodSeconds: 5
---
# TimescaleDB Exporter Service
apiVersion: v1
kind: Service
metadata:
  name: timescaledb-exporter
  namespace: quant-fund
  labels:
    app: timescaledb-exporter
    component: monitoring
spec:
  ports:
  - port: 9187
    targetPort: 9187
    name: metrics
  selector:
    app: timescaledb-exporter
---
# TimescaleDB Maintenance Job
apiVersion: batch/v1
kind: Job
metadata:
  name: timescaledb-maintenance
  namespace: quant-fund
spec:
  template:
    spec:
      containers:
      - name: maintenance
        image: timescale/timescaledb:latest-pg15
        command:
        - /bin/bash
        - -c
        - |
          # Run maintenance tasks
          psql -h timescaledb-primary -U postgres -d quantfund -c "
            -- Reindex hypertables
            CALL reindex_relation('market_data');
            CALL reindex_relation('trading_signals');
            CALL reindex_relation('risk_metrics');
            CALL reindex_relation('alternative_data');
            
            -- Update statistics
            ANALYZE market_data;
            ANALYZE trading_signals;
            ANALYZE risk_metrics;
            ANALYZE alternative_data;
            
            -- Refresh continuous aggregates
            CALL refresh_continuous_aggregate('market_data_1h');
            CALL refresh_continuous_aggregate('risk_metrics_1h');
            
            -- Compress old chunks
            SELECT compress_chunk(table_name, range_start) 
            FROM timescaledb_information.chunks 
            WHERE hypertable_name IN ('market_data', 'trading_signals', 'risk_metrics', 'alternative_data')
            AND range_end < now() - INTERVAL '30 days';
          "
          
          echo "Maintenance completed successfully"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: timescaledb-secrets
              key: postgres-password
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      restartPolicy: OnFailure
