# Istio Service Mesh Configuration for Mini Quant Fund
# Production-ready service mesh using open-source Istio

apiVersion: v1
kind: Namespace
metadata:
  name: quant-fund
  labels:
    istio-injection: enabled
---
# Istio Gateway for external access
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: quant-fund-gateway
  namespace: quant-fund
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: quantfund-tls
    hosts:
    - api.quantfund.com
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - api.quantfund.com
---
# Virtual Service for trading engine
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: trading-engine-vs
  namespace: quant-fund
spec:
  hosts:
  - api.quantfund.com
  gateways:
  - quant-fund-gateway
  http:
  - match:
    - uri:
        prefix: /trading
    route:
    - destination:
        host: trading-engine-service
        port:
          number: 80
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5ms
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
---
# Virtual Service for risk manager
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: risk-manager-vs
  namespace: quant-fund
spec:
  hosts:
  - api.quantfund.com
  gateways:
  - quant-fund-gateway
  http:
  - match:
    - uri:
        prefix: /risk
    route:
    - destination:
        host: risk-manager-service
        port:
          number: 80
    timeout: 60s
    retries:
      attempts: 2
      perTryTimeout: 30s
---
# Virtual Service for data processor
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: data-processor-vs
  namespace: quant-fund
spec:
  hosts:
  - api.quantfund.com
  gateways:
  - quant-fund-gateway
  http:
  - match:
    - uri:
        prefix: /data
    route:
    - destination:
        host: data-processor-service
        port:
          number: 80
    timeout: 120s
    retries:
      attempts: 1
      perTryTimeout: 60s
---
# Destination Rule for trading engine
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: trading-engine-dr
  namespace: quant-fund
spec:
  host: trading-engine-service
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 30s
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        maxPendingRequests: 50
        requestTimeout: 30s
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2
---
# Destination Rule for risk manager
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: risk-manager-dr
  namespace: quant-fund
spec:
  host: risk-manager-service
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 50
        connectTimeout: 30s
      http:
        http2MaxRequests: 500
        maxRequestsPerConnection: 5
        maxPendingRequests: 25
        requestTimeout: 60s
    circuitBreaker:
      consecutiveErrors: 2
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 100
---
# Service Entry for external Bloomberg API
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: bloomberg-api
  namespace: quant-fund
spec:
  hosts:
  - api.bloomberg.com
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
---
# Service Entry for external Refinitiv API
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: refinitiv-api
  namespace: quant-fund
spec:
  hosts:
  - api.refinitiv.com
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
---
# Authorization Policy for trading engine
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: trading-engine-authz
  namespace: quant-fund
spec:
  selector:
    matchLabels:
      app: trading-engine
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/quant-fund/sa/trading-service"]
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
---
# Authorization Policy for risk manager
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: risk-manager-authz
  namespace: quant-fund
spec:
  selector:
    matchLabels:
      app: risk-manager
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/quant-fund/sa/risk-service"]
  - to:
    - operation:
        methods: ["GET", "POST"]
---
# Peer Authentication Policy
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: quant-fund
spec:
  mtls:
    mode: STRICT
---
# Request Authentication Policy
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-auth
  namespace: quant-fund
spec:
  selector:
    matchLabels:
      app: trading-engine
  jwtRules:
  - issuer: "https://auth.quantfund.com"
    jwksUri: "https://auth.quantfund.com/.well-known/jwks.json"
    forwardOriginalToken: true
---
# Sidecar configuration for trading engine
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-engine-sidecar
  namespace: quant-fund
  labels:
    sidecar.istio.io/inject: "true"
data:
  config: |
    {
      "proxy": {
        "statsMatcher": {
          "inclusionPrefixes": [
            "trading_engine",
            "risk_management",
            "market_data"
          ]
        },
        "dynamicMetadata": {
          "sidecar.istio.io/discovery": {
            "forward_attributes": [
              "x-request-id",
              "x-b3-traceid",
              "x-b3-spanid"
            ]
          }
        }
      }
    }
---
# Envoy Filter for custom metrics
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: trading-engine-metrics
  namespace: quant-fund
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.wasm
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
          config:
            name: "trading_metrics_filter"
            vm_config:
              vm_id: "trading_metrics_vm"
              runtime: "envoy.wasm.runtime.v8"
              code:
                local:
                  filename: "/etc/istio/proxy/trading_metrics.wasm"
---
# Telemetry Policy for comprehensive observability
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: quant-fund-telemetry
  namespace: quant-fund
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  tracing:
  - sampling: 100.0
    custom_tags:
      environment:
        literal:
          value: "production"
      service:
        literal:
          value: "quant-fund"
  metrics:
  - providers:
    - name: prometheus
    overrides:
    - match:
        metric: ALL_METRICS
      tagOverrides:
        source_name:
          value: "istio"
        source_workload:
          value: "quant-fund"
---
# Workload Entry for trading engine
apiVersion: networking.istio.io/v1alpha1
kind: WorkloadEntry
metadata:
  name: trading-engine-1
  namespace: quant-fund
spec:
  address: 192.168.1.100
  labels:
    app: trading-engine
    version: v1
    instance-id: trading-engine-1
---
# Service Mesh Policy for traffic routing
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: traffic-routing
  namespace: quant-fund
spec:
  host: "*.quant-fund.svc.cluster.local"
  trafficPolicy:
    loadBalancer:
      consistentHash:
        httpHeaderName: "x-user-id"
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 30s
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        maxPendingRequests: 50
        requestTimeout: 30s
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
# Rate Limiting Service
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: rate-limit
  namespace: quant-fund
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.rate_limit
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.rate_limit.v3.RateLimit
          domain: "quant-fund"
          rate_limits:
          - actions:
            - generic_key:
                descriptor_key: "trading-api"
            - header_value_match:
                descriptor_key: "user-tier"
                descriptor_value: "premium"
                expect_match: true
---
# Retry Policy for critical services
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: retry-policy
  namespace: quant-fund
spec:
  hosts:
  - "*"
  http:
  - match:
    - uri:
        regex: "/(trading|risk)/.*"
    fault:
      delay:
        percentage:
          value: 0.01
        fixedDelay: 100ms
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: "5xx,gateway-error,connect-failure,refused-stream"
---
# Circuit Breaker Configuration
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: circuit-breaker
  namespace: quant-fund
spec:
  host: "*.quant-fund.svc.cluster.local"
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 30s
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
        maxPendingRequests: 50
        requestTimeout: 30s
    circuitBreaker:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
      splitExternalLocalOriginErrors: true
---
# Security Headers Injection
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: security-headers
  namespace: quant-fund
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.lua
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
          inlineCode: |
            function envoy_on_request(request_handle)
              request_handle:headers():add("X-Content-Type-Options", "nosniff")
              request_handle:headers():add("X-Frame-Options", "DENY")
              request_handle:headers():add("X-XSS-Protection", "1; mode=block")
              request_handle:headers():add("Strict-Transport-Security", "max-age=31536000; includeSubDomains")
              request_handle:headers():add("Content-Security-Policy", "default-src 'self'")
            end
