# Nexus Institutional Production Configuration
# ============================================
# Enterprise-grade settings matching Jane Street, Citadel, Jump Trading standards

environment: PRODUCTION
trading_enabled: true
log_level: INFO
data_cache_dir: data/parquet

# ─ EXECUTION CONFIGURATION ─
execution:
  mode: live  # backtest | paper | live | market-making
  asset_classes:
    - equities
    - fixed-income
    - derivatives
    - crypto
    - fx
  
# ─ MULTI-VENUE ROUTING ─
# Supports 235+ venues globally: NYSE, NASDAQ, LSE, Euronext, etc.
venues:
  - name: "NYSE"
    asset_classes: [equities]
    latency_target_us: 50  # Microseconds - ultra-low latency
    max_order_size: 50000000
    commission_bps: 0.05
    
  - name: "NASDAQ"
    asset_classes: [equities]
    latency_target_us: 75
    max_order_size: 50000000
    commission_bps: 0.05
    
  - name: "CBOE"
    asset_classes: [derivatives]
    latency_target_us: 100
    max_order_size: 100000
    commission_bps: 0.1
    
  - name: "CME"
    asset_classes: [derivatives, commodities]
    latency_target_us: 500
    max_order_size: 100000
    commission_bps: 0.15
    
  - name: "LSE"
    asset_classes: [equities, fixed-income]
    latency_target_us: 200
    max_order_size: 10000000
    commission_bps: 0.08
    
  - name: "Euronext"
    asset_classes: [equities, fixed-income]
    latency_target_us: 250
    max_order_size: 5000000
    commission_bps: 0.1
    
  - name: "Kraken"
    asset_classes: [crypto]
    latency_target_us: 1000
    max_order_size: 100
    commission_bps: 0.16
    
  - name: "EBS"
    asset_classes: [fx]
    latency_target_us: 100
    max_order_size: 1000000
    commission_bps: 0.001

# ─ MARKET MAKING CONFIGURATION ─
market_making:
  enabled: true
  model: "optiver"  # optiver | jump_trading | imc | virtu
  
  # Quote Parameters
  spread_model: "dynamic"  # Adjust spreads based on volatility and inventory
  min_spread_bps: 0.01
  max_spread_bps: 1.0
  inventory_target: 0.0  # Net-neutral
  inventory_limit: 1000000
  
  # Risk Parameters
  max_position_notional: 50000000
  max_position_Greeks:
    delta: 1000  # Max delta exposure
    gamma: 100
    vega: 500
    theta: 1000

# ─ EXECUTION MICROSTRUCTURE ─
execution_microstructure:
  model: "almgren-chriss"  # Almgren-Chriss optimal execution
  
  # Permanent Impact: λ
  permanent_impact_coeff: 0.0001
  
  # Temporary Impact: √α
  temporary_impact_coeff: 0.00001
  
  # Order scheduling
  min_order_size: 100
  max_order_size: 10000000
  
  # Slippage assumptions
  slippage_bps: 0.5

# ─ INSTITUTIONAL RISK FRAMEWORK ─
# Matching Citadel, Jane Street, XTX standards
risk:
  # Global Leverage Limits
  gross_leverage_limit: 10.0  # 10x gross
  net_leverage_limit: 3.0
  
  # Concentration Limits
  sector_concentration_limits:
    "Technology": 0.15
    "Finance": 0.12
    "Healthcare": 0.10
    "Energy": 0.08
    "Consumer": 0.10
    "Industrials": 0.08
    "Utilities": 0.05
    "Real Estate": 0.05
    "Materials": 0.05
    "Communications": 0.08
  
  # Country/Regional Exposure
  single_country_limit: 0.40
  emerging_markets_limit: 0.20
  
  # Default Risk (Credit)
  single_counterparty_exposure: 0.05
  investment_grade_only: false
  
  # Daily Limits
  max_daily_loss_usd: 1000000  # Hard stop
  max_daily_loss_pct: 0.02  # 2% of AUM
  
  # Pre-Trade Risk Checks
  pre_trade_checks:
    - sector_concentration
    - gross_leverage
    - concentration_limits
    - margin_utilization
    - counterparty_credit
  
  # CVaR (Conditional Value at Risk)
  cvar_confidence: 0.95  # 95% confidence
  cvar_percentile: 95
  cvar_limit: -0.05  # 5% max expected shortfall

# ─ ULTRA-LOW LATENCY ENABLEMENT ─
low_latency:
  mode: "microsecond"  # microsecond | millisecond
  
  # FPGA/Hardware Acceleration
  fpga_enabled: true
  microwave_network_enabled: true
  
  # Co-location
  colocation_enabled: true
  colocation_providers:
    - "Equinix"
    - "Digital Realty"
    - "CoreWeave"
  
  # Memory Optimization
  memory_pool_size_gb: 64
  use_memory_mapping: true
  
  # Network
  network_priority: "low-latency"  # tcp_quick | lo_lat | standard
  tcp_recv_buffer_size: 16777216  # 16MB
  tcp_send_buffer_size: 16777216

# ─ DECENTRALIZED STRATEGY ARCHITECTURE ─
# Tower Research Capital style - decentralized teams
strategies:
  - name: "momentum_global"
    enabled: true
    asset_classes: [equities]
    lookback: 252
    decentralized: true
    
  - name: "mean_reversion"
    enabled: true
    asset_classes: [equities, fixed-income]
    lookback: 60
    decentralized: true
    
  - name: "options_arbitrage"
    enabled: true
    asset_classes: [derivatives]
    decentralized: false  # Centralized for options
    
  - name: "fx_carry"
    enabled: true
    asset_classes: [fx]
    decentralized: true
    
  - name: "crypto_stat_arb"
    enabled: true
    asset_classes: [crypto]
    decentralized: true

# ─ BACKTEST CONFIGURATION ─
backtest:
  initial_cash: 1000000000  # $1B
  commission_bps: 0.5
  slippage_bps: 1.0
  
  # Walk-forward validation
  walkforward_window_years: 2
  walkforward_step_years: 1
  
  # Stress testing
  stress_tests:
    - "black_swan_2008"
    - "covid_2020"
    - "vix_spike_2018"
    - "treasury_tantrum_2013"

# ─ CLOUD DEPLOYMENT ─
cloud:
  provider: "azure"
  region: "westus2"
  environment: "production"
  
  # Kubernetes
  aks_vm_count: 20
  enable_gpu: true
  enable_fpga: true  # For ultra-low latency on FPGA-accelerated nodes
  auto_scaling_enabled: true
  min_replicas: 5
  max_replicas: 100
  
  # Storage
  backup_frequency: "hourly"
  data_replication: "geo-redundant"

# ─ MONITORING & OBSERVABILITY ─
monitoring:
  # Application Performance Monitoring
  apm_enabled: true
  apm_sample_rate: 1.0
  
  # Metrics
  metrics:
    - "order_latency_p99"
    - "fill_rate"
    - "slippage_realized"
    - "daily_pnl"
    - "sharpe_ratio"
    - "max_drawdown"
    - "portfolio_delta"
    - "sector_exposure"
  
  # Alerts
  alerts:
    - metric: "daily_loss_usd"
      threshold: 500000
      action: "halt_trading"
    - metric: "order_latency_p99"
      threshold: 10000  # microseconds
      action: "notify"
    - metric: "fill_rate"
      threshold: 0.85
      action: "notify"

# ─ COMPLIANCE & REGULATORY ─
compliance:
  mode: "strict"
  
  # Reporting
  daily_pnl_reporting: true
  position_limit_reporting: true
  
  # Trade Reconstruction
  order_audit_trail: true
  trade_blotter_retention_days: 2555  # 7 years
  
  # Restrictions
  restricted_symbols: []
  restricted_sectors: []
  restricted_countries: []

# ─ DATABASE CONFIGURATION ─
database:
  engine: "postgresql"
  host: "${DATABASE_HOST}"
  port: 5432
  database: "nexus_production"
  
  # Connection Pool
  pool_size: 50
  max_overflow: 20
  pool_recycle: 3600

# ─ CACHING LAYER ─
cache:
  engine: "redis"
  host: "${REDIS_HOST}"
  port: 6379
  ttl_seconds: 3600
  max_memory_mb: 65536

# ─ MESSAGING & ASYNC ─
messaging:
  engine: "kafka"
  brokers: ["${KAFKA_BROKER_1}", "${KAFKA_BROKER_2}"]
  
  topics:
    - name: "market_data"
      partitions: 32
    - name: "orders"
      partitions: 16
    - name: "trades"
      partitions: 16
    - name: "risk_events"
      partitions: 8
