name: CI/CD Production Pipeline

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # Stage 1: Lint & Security
  # ===========================================
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flake8 black isort detect-secrets bandit safety

      - name: Black formatting check
        run: black --check --diff .

      - name: isort import check
        run: isort --check-only --diff .

      - name: Flake8 lint
        run: flake8 --max-line-length 88 --extend-ignore=E203,W503 .

      - name: Secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline || true
          grep -rn "api_key\|secret_key\|password" --include="*.py" --include="*.yaml" | grep -v ".env" | grep -v "__pycache__" | grep -v "\\$\\{" | grep -v "os\\.environ" | grep -v "your_" || true

      - name: Security audit (Bandit)
        run: bandit -r mini_quant_fund/ brokers/ execution/ risk/ strategies/ -ll

      - name: Dependency vulnerability scan
        run: safety check -r requirements.txt || true

  # ===========================================
  # Stage 2: Unit Tests
  # ===========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: quant
          POSTGRES_PASSWORD: quant
          POSTGRES_DB: mini_quant_fund
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,prod]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://quant:quant@localhost:5432/mini_quant_fund
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          pytest tests/ -v --tb=short --cov=mini_quant_fund --cov-report=xml -x

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml

  # ===========================================
  # Stage 3: Integration Tests
  # ===========================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: quant
          POSTGRES_PASSWORD: quant
          POSTGRES_DB: mini_quant_fund_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install
        run: pip install -e ".[dev,prod]"

      - name: Integration tests
        env:
          DATABASE_URL: postgresql://quant:quant@localhost:5432/mini_quant_fund_test
        run: pytest tests/integration/ -v --tb=short

  # ===========================================
  # Stage 4: Build & Push Docker
  # ===========================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, integration]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ===========================================
  # Stage 5: Deploy to Staging
  # ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # kubectl set image deployment/quant-fund quant-fund=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # OR: docker-compose -f docker-compose.staging.yml up -d

  # ===========================================
  # Stage 6: Deploy to Production
  # ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/heads/release/')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Blue-green deployment with canary
