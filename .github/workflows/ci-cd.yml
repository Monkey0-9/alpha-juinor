name: CI/CD Production Pipeline

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================
  # Stage 1: Lint & Security
  # ===========================================
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flake8 black isort detect-secrets bandit safety

      - name: Black formatting check
        run: black --check --diff .

      - name: isort import check
        run: isort --check-only --diff .

      - name: Flake8 lint
        run: flake8 --max-line-length 88 --extend-ignore=E203,W503 .

      - name: Secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline || true
          grep -rn "api_key\|secret_key\|password" --include="*.py" --include="*.yaml" | grep -v ".env" | grep -v "__pycache__" | grep -v "\\$\\{" | grep -v "os\\.environ" | grep -v "your_" || true

      - name: Security audit (Bandit)
        run: bandit -r mini_quant_fund/ brokers/ execution/ risk/ strategies/ -ll

      - name: Dependency vulnerability scan
        run: safety check -r requirements.txt || true

  # ===========================================
  # Stage 2: Unit Tests
  # ===========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: quant
          POSTGRES_PASSWORD: quant
          POSTGRES_DB: mini_quant_fund
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,prod]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://quant:quant@localhost:5432/mini_quant_fund
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          pytest tests/ -v --tb=short --cov=mini_quant_fund --cov-report=xml -x

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml

  # ===========================================
  # Stage 3: Integration Tests
  # ===========================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: quant
          POSTGRES_PASSWORD: quant
          POSTGRES_DB: mini_quant_fund_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install
        run: pip install -e ".[dev,prod]"

      - name: Integration tests
        env:
          DATABASE_URL: postgresql://quant:quant@localhost:5432/mini_quant_fund_test
        run: pytest tests/integration/ -v --tb=short

  # ===========================================
  # Stage 4: Build & Push Docker
  # ===========================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, integration]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ===========================================
  # Stage 5: Deploy to Staging
  # ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # kubectl set image deployment/quant-fund quant-fund=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # OR: docker-compose -f docker-compose.staging.yml up -d

  # ===========================================
  # Stage 6: Performance Benchmarks
  # ===========================================
  performance:
    name: Performance & Throughput Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,prod]" psutil

      - name: Run throughput benchmarks
        run: |
          python benchmarks/throughput_test.py --duration 30 --rps 1000

      - name: Run latency benchmarks
        run: |
          python -m mini_quant_fund.benchmarks.latency_async || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: output/benchmarks/
          retention-days: 30

  # ===========================================
  # Stage 7: Chaos Engineering Tests
  # ===========================================
  chaos:
    name: Chaos Engineering Tests
    runs-on: ubuntu-latest
    needs: [test, integration]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: quant
          POSTGRES_PASSWORD: quant
          POSTGRES_DB: mini_quant_fund_chaos
        options: >-
          --health-cmd pg_isready
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,prod]"

      - name: Run chaos tests
        env:
          DATABASE_URL: postgresql://quant:quant@localhost:5432/mini_quant_fund_chaos
          CHAOS_TEST_MODE: "ci"
        run: |
          python -m pytest tests/chaos/ -v --tb=short || python tests/chaos/chaos_test_suite.py

      - name: Run fault injection tests
        run: |
          python tests/chaos/test_circuit_breaker_fault.py || true

      - name: Upload chaos test results
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-results
          path: output/chaos/
          retention-days: 14

  # ===========================================
  # Stage 8: Load Testing
  # ===========================================
  load-test:
    name: Load & Stress Testing
    runs-on: ubuntu-latest
    needs: performance
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,prod]" locust

      - name: Run load tests
        run: |
          python tests/load/load_testing.py --duration 60 --users 100

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: output/load/
          retention-days: 14

  # ===========================================
  # Stage 9: Security Hardening Scan
  # ===========================================
  security-hardening:
    name: Advanced Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ===========================================
  # Stage 10: Production Readiness Check
  # ===========================================
  production-readiness:
    name: Production Readiness Verification
    runs-on: ubuntu-latest
    needs: [integration, performance, chaos, security-hardening]
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev,prod]"

      - name: Run production readiness checks
        run: |
          python diagnose_trading_execution.py --json

      - name: Validate configuration
        run: |
          python -c "from mini_quant_fund.core.production_config import config_manager; print('Production config validated')"

      - name: Check SLO compliance
        run: |
          python -c "
          import json
          with open('output/benchmarks/latest.json') as f:
              results = json.load(f)
              assert results['summary']['sub_ms_latency_achieved'], 'Sub-millisecond latency not achieved'
              assert results['summary']['target_rps_achieved'], 'Target RPS not achieved'
              print('All SLOs met')
          " || echo "Benchmark results not yet available"

  # ===========================================
  # Stage 11: Deploy to Production
  # ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, production-readiness]
    if: startsWith(github.ref, 'refs/heads/release/')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy to production (Canary)
        run: |
          echo "Starting canary deployment..."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          # kubectl set image deployment/quant-fund-canary quant-fund=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # kubectl rollout status deployment/quant-fund-canary --timeout=5m

      - name: Run smoke tests on canary
        run: |
          echo "Running smoke tests on canary deployment..."
          # curl -sf http://canary-endpoint/health || exit 1

      - name: Promote to full deployment
        if: success()
        run: |
          echo "Promoting canary to full production..."
          # kubectl set image deployment/quant-fund quant-fund=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # kubectl rollout status deployment/quant-fund --timeout=10m

      - name: Notify deployment success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ MiniQuantFund deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\nVersion: ${{ github.sha }}\nBranch: ${{ github.ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed - initiating rollback..."
          # kubectl rollout undo deployment/quant-fund
          # Notify on-call engineer
