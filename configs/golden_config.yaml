# 2. Execution Parameters
execution:
  mode: "paper"  # paper | backtest | live
  enabled: true # Feature flag for execution decision layer
  initial_capital: 1000000.0
  rebalance_frequency: "daily"
  commission_bps: 2.0  # 0.02%
  slippage_model: "probabilistic"
  adv_limit_pct: 0.10   # Don't exceed 10% of ADV

  # Execution Decision Layer defaults (override by trading_mode)
  min_notional_usd: 200
  min_weight_change: 0.0025
  min_conviction: 0.30
  max_skip_cycles: 3
  min_qty: 1
  safety_buffer_usd: 5.0

# "Safe mode" execution: only passive limit orders
execution_defaults:
  aggressiveness: passive
  max_twap_participation: 0.05

trading_mode: "cautious" # research | cautious | active | aggressive

# 3. Alpha Ensemble Weights
alpha:
  technical_weight: 0.5
  ml_weight: 0.5
  macro_weight: 0.0  # Optional overlay disabled for baseline
  use_regime_filter: true

# 4. Institutional Risk Limits (HARDENED / EMERGENCY)
risk:
  max_gross_leverage: 0.5  # EMERGENCY: Reduced from 2.0
  target_volatility_annualized: 0.10 # Reduced from 0.25
  position_concentration_limit: 0.10 # Reduced from 0.20
  max_drawdown_limit: 0.05 # Stricter limit 5%
  cvar_limit: 0.03

  # --- NEW: 7-Gate Risk Management Parameters ---
  max_position_pct: 0.05  # Max 5% of NAV per position
  max_sector_pct: 0.20    # Max 20% of NAV per sector
  max_correlation: 0.90   # Max 0.90 correlation with largest position
  max_vix: 50.0           # Reject if VIX > 50
  max_realized_vol: 0.50  # Reject if realized vol > 50%

  # --- Volatility Scaling Parameters ---
  base_leverage: 3.0      # Base leverage (scales down with vol)
  volatility_scale_factor: 1.0  # Multiplier for volatility adjustment

# 4.1 Optimizer Parameters (Hardened)
optimizer:
  lambda_risk: 4.0      # Increased risk aversion
  gamma_cvar: 8.0       # Higher tail aversion
  kappa_turnover: 0.1   # Heavier turnover penalty
  uncertainty_radius: 1.5

# 4.2: Trading Type Parameters (13-Type Unified Engine)
trading_types:
  day_trading:
    hold_minutes_min: 1
    hold_minutes_max: 390  # 6.5 hours
    position_size_pct: 0.03
    stop_loss_pct: 0.02
    take_profit_pct: [0.05, 0.10]
    auto_close_time: "15:50"  # 3:50 PM ET
    max_daily: 10
  swing_trading:
    hold_minutes_min: 120  # 2 hours
    hold_minutes_max: 28800  # 20 days
    position_size_pct: 0.03
    stop_loss_pct: 0.05
    take_profit_pct: [0.05, 0.10, 0.15]
    max_concurrent: 15
  scalping:
    hold_minutes_min: 0.15  # 10 seconds
    hold_minutes_max: 5
    position_size_pct: 0.01
    stop_loss_pct: 0.003
    take_profit_pct: [0.005, 0.01]
    max_daily: 200
    order_book_monitoring: true
  position_trading:
    hold_minutes_min: 43200  # 30 days
    hold_minutes_max: 525600  # 1 year
    position_size_pct: 0.05
    stop_loss_pct: 0.10
    take_profit_pct: [0.20, 0.50]
    trailing_stop: true
  momentum_trading:
    hold_minutes_min: 60  # 1 hour
    hold_minutes_max: 1440  # 1 day
    position_size_pct: 0.04
    stop_loss_pct: 0.04
    take_profit_pct: [0.08, 0.15]
  algorithmic:
    hold_minutes_min: 1
    hold_minutes_max: 10080  # 1 week
    position_size_pct: 0.04
    stop_loss_pct: 0.02
    take_profit_pct: [0.05, 0.10]
  social_trading:
    hold_minutes_min: 60
    hold_minutes_max: 1440
    position_size_pct: 0.02
    stop_loss_pct: 0.03
    take_profit_pct: [0.05, 0.10]
  copy_trading:
    hold_minutes_min: 30
    hold_minutes_max: 2880  # 2 days
    position_size_pct: 0.025
    stop_loss_pct: 0.04
    take_profit_pct: [0.05, 0.12]
    scale_to_nav: true
  news_trading:
    hold_minutes_min: 5
    hold_minutes_max: 120  # 2 hours
    position_size_pct: 0.02
    stop_loss_pct: 0.04
    take_profit_pct: [0.03, 0.08]
  technical_trading:
    hold_minutes_min: 60
    hold_minutes_max: 2880
    position_size_pct: 0.03
    stop_loss_pct: 0.03
    take_profit_pct: [0.05, 0.12]
  fundamental_trading:
    hold_minutes_min: 1440  # 1 day
    hold_minutes_max: 262080  # 6 months
    position_size_pct: 0.04
    stop_loss_pct: 0.08
    take_profit_pct: [0.15, 0.30]
  delivery_trading:
    hold_minutes_min: 525600  # 1 year
    hold_minutes_max: 5256000  # 10 years
    position_size_pct: 0.05
    dividend_reinvestment: true
  event_driven:
    hold_minutes_min: 60
    hold_minutes_max: 1440
    position_size_pct: 0.03
    stop_loss_pct: 0.05
    take_profit_pct: [0.05, 0.20]

ops:
  reconciliation_threshold_bps: 10.0 # 0.1% drift allowed
  min_data_fill_rate: 0.95
  alert_level: "INFO"

# 5.1 Database Hardening
database:
  sqlite_wal: true
  sqlite_busy_timeout_ms: 5000

# 6. Notification & Alerting (Added for spam reduction)
notifications:
  monitor_notify_level: "ERROR"  # Only send ERROR level alerts
  heartbeat_interval_seconds: 3600  # Heartbeat once per hour
  alert_dedup_window_seconds: 600  # Dedupe same alert for 10 minutes
  enable_daily_summary: true
  notify_on_state_change_only: true  # Only alert on state changes

# 6. Feature Flags (Institutional Upgrades)
features:
  ml_enabled: true  # ACTIVATED: Shadow Mode for Alpha Rehabilitation
  ml_mode: live  # ML operating mode: disabled | shadow | live
  use_regime_detection: true
  use_wyckoff_filter: true
  use_auction_market_confidence: true
  use_market_profile_value_area: true
  use_gann_time_filter: true
  use_cvar_risk_gate: true
  use_fat_tail_protection: true
  use_vpin_filter: true
  use_cointegration_filter: false # Research only for now

# 7. ML Quality Gates
ml_quality:
  min_sharpe: 0.5          # Minimum Sharpe ratio for model approval
  max_drawdown: 0.20       # Maximum 20% drawdown
  min_ic: 0.05             # Minimum information coefficient

# 7. Data Provider API Keys (loaded from environment variables)
# Set POLYGON_API_KEY and NEWS_API_KEY in your .env file
data_providers:
  polygon_api_key: "${POLYGON_API_KEY}"
  news_api_key: "${NEWS_API_KEY}"
# 8. ML Governance
ml_governance:
  failure_threshold: 10  # Reduced aggression: allow 10 critical failures per window
  window_seconds: 600    # 10 minute window

# 9. Quantum Physics Modules (FROZEN SPEC)
# Any change requires Governance Approval + Decision Log
quantum:
  # Regime State Space (B, B, S, V, C)
  regimes: 5

  # Entanglement (Coupling Phase Transition)
  tail_quantile: 0.05
  entanglement_threshold: 0.7
  entanglement_beta: 0.5  # Cap reduction factor

  # Path Integral (Feynman-Kac Stress)
  path_integral:
    samples: 2000
    importance_bias: 0.10  # Shift mean by 0.1 sigma

  # Non-Commutative Operators
  operator_sequence:
    max_ops: 4
    beam_width: 5

