version: '3.8'

services:
  nexus-engine:
    build: .
    container_name: nexus-engine
    environment:
      - ENVIRONMENT=PRODUCTION
      - TRADING_ENABLED=FALSE
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["--mode", "sim", "--config", "config/production.yaml"]
    restart: unless-stopped

  # Placeholder for future components (e.g., Redis for inter-process communication)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
