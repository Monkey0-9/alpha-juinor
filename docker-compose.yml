version: '3.8'

services:
  nexus-platform:
    build: .
    container_name: nexus_platform
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8001"
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/api/health').status == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
